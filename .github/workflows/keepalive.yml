name: Supabase Keep-Alive

on:
  schedule:
    # Every 3 days at 08:00 UTC
    - cron: '0 8 */3 * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  actions: write # Required by keepalive-workflow to re-enable this workflow

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -sf \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/recipes?select=id&limit=1" \
            && echo "✅ Supabase is alive" \
            || { echo "❌ Supabase ping failed"; exit 1; }

      # GitHub disables scheduled workflows after 60 days without repo
      # activity; re-enabling via the API on every run resets that timer.
      - name: Keep workflow enabled
        run: |
          curl -sf -X PUT \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/keepalive.yml/enable" \
            && echo "✅ Workflow re-enabled (inactivity timer reset)"
