name: Supabase Keep-Alive

on:
  schedule:
    # Every 3 days at 08:00 UTC
    - cron: '0 8 */3 * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  actions: write # Required by keepalive-workflow to re-enable this workflow

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -sf \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/recipes?select=id&limit=1" \
            && echo "✅ Supabase is alive" \
            || { echo "❌ Supabase ping failed"; exit 1; }

      # GitHub disables scheduled workflows after 60 days without repo
      # activity; this step keeps the schedule alive via the Actions API.
      - name: Keep workflow enabled
        uses: gautamkrishnar/keepalive-workflow@v2
        with:
          use_api: true
